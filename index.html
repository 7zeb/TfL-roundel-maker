<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TfL Roundel Maker</title>
</head>
<body>

  <svg id="roundel" width="400" height="400" viewBox="0 0 400 400">
  <!-- Ring -->
  <circle id="ring"
          cx="200" cy="200" r="150"
          fill="none"
          stroke="#DA291C"
          stroke-width="40" />

  <!-- Bar (station signage proportions) -->
  <rect id="bar"
        x="20" y="165"
        width="360" height="70"
        fill="#003688" />

  <!-- Text -->
  <text id="label"
        x="200" y="210"
        text-anchor="middle"
        font-size="38"
        font-family="Arial, sans-serif"
        fill="white">
    UNDERGROUND
  </text>
</svg>




  <br><br>

  <!-- Controls -->
Ring Colour: <input type="color" id="ringColor" value="#DA291C"><br><br>
Bar Colour: <input type="color" id="barColor" value="#003688"><br><br>
Text Colour: <input type="color" id="textColor" value="#ffffff"><br><br>
  Label: <input type="text" id="textInput" value="UNDERGROUND"><br><br>

  <button id="underground">Underground</button>
  <button id="overground">Overground</button>
  <button id="dlr">DLR</button>
  <button id="elizabeth">Elizabeth</button>

  <br><br>

  <button id="download">Download SVG</button>
  <button id="downloadPng">Download PNG</button>


  <script src="script.js"></script>
</body>
</html>
