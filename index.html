<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TfL Roundel Maker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header>
      <h1>TfL Roundel Maker</h1>
      <p>Create a custom roundel and export it as SVG.</p>
    </header>

    <section class="content">
      <div class="preview">
        <svg id="roundel" width="400" height="400" viewBox="0 0 400 400">
          <!-- Outer circle -->
          <circle id="outerCircle"
                  cx="200" cy="200" r="150"
                  fill="none"
                  stroke="#0019A8"
                  stroke-width="40" />

          <!-- Bar -->
          <rect id="bar"
                x="50" y="170"
                width="300" height="60"
                fill="#0019A8" />

          <!-- Text -->
          <text id="label"
                x="200" y="212"
                text-anchor="middle"
                font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
                font-size="32"
                fill="#ffffff">
            STATION
          </text>
        </svg>
      </div>

      <div class="controls">
        <div class="control-group">
          <label for="circleColor"><span>Circle colour</span></label>
          <input type="color" id="circleColor" value="#0019A8">
        </div>

        <div class="control-group">
          <label for="barColor"><span>Bar colour</span></label>
          <input type="color" id="barColor" value="#0019A8">
        </div>

        <div class="control-group">
          <label for="textColor"><span>Text colour</span></label>
          <input type="color" id="textColor" value="#ffffff">
        </div>

        <div class="control-group">
          <label for="textInput"><span>Label text</span></label>
          <input type="text" id="textInput" value="STATION" maxlength="20">
        </div>

        <div class="control-group presets">
          <span>Presets</span>
          <div class="preset-buttons">
            <button data-preset="underground">Underground</button>
            <button data-preset="overground">Overground</button>
            <button data-preset="dlr">DLR</button>
            <button data-preset="elizabeth">Elizabeth line/Crossrail</button>
          </div>
        </div>

        <button id="downloadBtn" class="primary">Download SVG</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
